name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # sentinel is standard-library only: requirements.txt documents that stance
      # and pins no third-party runtime deps, so there is nothing to install.

      - name: Run tests
        run: python -m unittest discover -s tests
